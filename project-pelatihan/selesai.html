<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pendaftaran Selesai</title>

  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/css/peserta.css" />
</head>
<body>
  <main class="container">
    <section class="success-section success-section-modern">
      <div class="success-header">
        <img src="assets/img/logo-perusahaan.png" alt="Logo Perusahaan" class="success-logo" />
      </div>

      <div class="success-checkmark-wrap">
        <div class="success-checkmark">✓</div>
      </div>

      <div class="success-content">
        <h1 class="success-title-main">PENDAFTARAN SELESAI</h1>

        <p class="success-submit-time" id="successWaktuSubmit">
          Waktu Submit: -
        </p>

        <div class="success-message-box modern-message-box">
          <p class="success-text success-text-main" id="successIntro">
            Terima Kasih, -.
          </p>

          <p class="success-text">
            Proses pendaftaran Anda telah berhasil diselesaikan dan seluruh data telah direkam.
          </p>

          <p class="success-text success-text-highlight" id="successPelatihan">
            Selamat mengikuti pelatihan -.
          </p>

          <p class="success-text">
            Semoga pelatihan berjalan lancar dan bermanfaat.
          </p>
        </div>
      </div>
    </section>
  </main>

  <script src="assets/js/pelatihan-options.js"></script>
  <script src="assets/js/selesai.js"></script>
</body>
</html>
