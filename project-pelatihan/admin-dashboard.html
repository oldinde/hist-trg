<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Historical Training</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      margin: 0;
      color: #111827;
    }

    .header {
      background: #111827;
      color: white;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      margin: 0;
      font-size: 22px;
    }

    .logout-btn {
      background: #ef4444;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .logout-btn:hover {
      background: #dc2626;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    .section-title {
      margin-bottom: 16px;
      font-size: 20px;
      font-weight: bold;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.06);
    }

    .stat-card h3 {
      margin: 0 0 10px 0;
      font-size: 14px;
      color: #6b7280;
    }

    .stat-card p {
      margin: 0;
      font-size: 28px;
      font-weight: bold;
    }

    .search-card,
    .table-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.06);
      margin-bottom: 24px;
    }

    .search-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .search-row input {
      flex: 1;
      min-width: 220px;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
    }

    .search-row button {
      padding: 12px 18px;
      border: none;
      background: #2563eb;
      color: white;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    .search-row button:hover {
      background: #1d4ed8;
    }

    .helper-text {
      margin-top: 10px;
      font-size: 14px;
      color: #6b7280;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
    }

    thead {
      background: #f9fafb;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      font-size: 14px;
    }

    th {
      color: #374151;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      background: #dbeafe;
      color: #1d4ed8;
    }

    .action-link {
      color: #2563eb;
      text-decoration: none;
      font-weight: bold;
    }

    .action-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Dashboard Historical Training</h1>
    <button id="logoutBtn" class="logout-btn">Logout</button>
  </div>

  <div class="container">
    <div class="section-title">Ringkasan</div>

    <div class="stats-grid">
      <div class="stat-card">
        <h3>Total Submission</h3>
        <p>128</p>
      </div>

      <div class="stat-card">
        <h3>Total Peserta</h3>
        <p>104</p>
      </div>

      <div class="stat-card">
        <h3>Total Training</h3>
        <p>7</p>
      </div>
    </div>

    <div class="search-card">
      <div class="section-title">Cari Peserta berdasarkan NRP</div>

      <div class="search-row">
        <input type="text" id="nrpSearchInput" placeholder="Masukkan NRP..." />
        <button id="searchBtn">Cari</button>
      </div>

      <div class="helper-text" id="searchMessage">
        Masukkan NRP untuk mencari data peserta.
      </div>
      <div id="searchResult" style="margin-top:16px;"></div>
    </div>

    <div class="table-card">
      <div class="section-title">Submission Terbaru</div>

      <table>
        <thead>
          <tr>
            <th>NRP</th>
            <th>Nama</th>
            <th>Training</th>
            <th>Tanggal</th>
            <th>Status</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="latestSubmissionsBody">
  <tr>
    <td colspan="6">Memuat data...</td>
  </tr>
</tbody>

      </table>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config/supabase.js"></script>

  <script>
  const isLoggedIn = localStorage.getItem("adminLoggedIn");

  if (isLoggedIn !== "true") {
    window.location.href = "admin-login.html";
  }

  const logoutBtn = document.getElementById("logoutBtn");
  const searchBtn = document.getElementById("searchBtn");
  const nrpSearchInput = document.getElementById("nrpSearchInput");
  nrpSearchInput.addEventListener("input", function () {
  let value = nrpSearchInput.value.toUpperCase();
  value = value.replace(/\s+/g, "");
  nrpSearchInput.value = value;
});
  const searchMessage = document.getElementById("searchMessage");
  const searchResult = document.getElementById("searchResult");
  const latestSubmissionsBody = document.getElementById("latestSubmissionsBody");


  logoutBtn.addEventListener("click", function () {
    localStorage.removeItem("adminLoggedIn");
    window.location.href = "admin-login.html";
  });

  async function loadLatestSubmissions() {
  latestSubmissionsBody.innerHTML = `
    <tr>
      <td colspan="6">Memuat data...</td>
    </tr>
  `;

  try {
    const { data, error } = await window.sb
      .from("training_submissions")
      .select(`
        id,
        kategori_pelatihan,
        jenis_pelatihan_unit,
        jenis_pelatihan_teknikal,
        final_submitted_at,
        created_at,
        peserta (
          nrp,
          nama_lengkap
        )
      `)
      .order("created_at", { ascending: false })
      .limit(10);

    if (error) {
      throw error;
    }

    if (!data || data.length === 0) {
      latestSubmissionsBody.innerHTML = `
        <tr>
          <td colspan="6">Belum ada submission.</td>
        </tr>
      `;
      return;
    }

    const rowsHtml = data.map(item => {
      const peserta = Array.isArray(item.peserta) ? item.peserta[0] : item.peserta;
      const namaTraining =
        item.jenis_pelatihan_unit ||
        item.jenis_pelatihan_teknikal ||
        item.kategori_pelatihan ||
        "-";

      const tanggal = item.final_submitted_at || item.created_at;

      return `
        <tr>
          <td>${peserta?.nrp ?? "-"}</td>
          <td>${peserta?.nama_lengkap ?? "-"}</td>
          <td>${namaTraining}</td>
          <td>${tanggal ? new Date(tanggal).toLocaleDateString("id-ID") : "-"}</td>
          <td><span class="badge">Submitted</span></td>
          <td><a href="admin-detail.html?id=${item.id}" class="action-link">Lihat Detail</a></td>
        </tr>
      `;
    }).join("");

    latestSubmissionsBody.innerHTML = rowsHtml;
  } catch (err) {
    console.error("LOAD LATEST SUBMISSIONS ERROR:", err);
    latestSubmissionsBody.innerHTML = `
      <tr>
        <td colspan="6">Gagal memuat data submission terbaru.</td>
      </tr>
    `;
  }
}

  searchBtn.addEventListener("click", async function () {
    const nrp = nrpSearchInput.value.toUpperCase().replace(/\s+/g, "");

    searchResult.innerHTML = "";

    if (!nrp) {
      searchMessage.textContent = "NRP harus diisi.";
      searchMessage.style.color = "red";
      return;
    }

    searchMessage.textContent = "Mencari data...";
    searchMessage.style.color = "#6b7280";

    try {
      // 1. Cari peserta berdasarkan NRP
      const { data: pesertaData, error: pesertaError } = await window.sb
        .from("peserta")
        .select("id, nrp, nama_lengkap")
        .eq("nrp", nrp)
        .limit(1);

      if (pesertaError) {
        throw pesertaError;
      }

      if (!pesertaData || pesertaData.length === 0) {
        searchMessage.textContent = "Peserta dengan NRP tersebut tidak ditemukan.";
        searchMessage.style.color = "red";
        return;
      }

      const peserta = pesertaData[0];

      // 2. Cari submission milik peserta tersebut
      const { data: submissions, error: submissionsError } = await window.sb
        .from("training_submissions")
        .select(`
          id,
          kategori_pelatihan,
          jenis_pelatihan_unit,
          jenis_pelatihan_teknikal,
          group_egi,
          kelas_teknikal,
          tempat_penyelenggaraan,
          final_submitted_at,
          created_at
        `)
        .eq("peserta_id", peserta.id)
        .order("created_at", { ascending: false });

      if (submissionsError) {
        throw submissionsError;
      }

      if (!submissions || submissions.length === 0) {
        searchMessage.textContent = `Peserta ditemukan, tetapi belum memiliki submission training.`;
        searchMessage.style.color = "#b45309";

        searchResult.innerHTML = `
          <div class="table-card" style="margin-bottom:0;">
            <div class="section-title">Data Peserta</div>
            <table>
              <thead>
                <tr>
                  <th>NRP</th>
                  <th>Nama</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>${peserta.nrp ?? "-"}</td>
                  <td>${peserta.nama_lengkap ?? "-"}</td>
                  <td>Belum ada submission</td>
                </tr>
              </tbody>
            </table>
          </div>
        `;
        return;
      }

      searchMessage.textContent = `Ditemukan ${submissions.length} submission untuk NRP ${nrp}.`;
      searchMessage.style.color = "green";

      const rowsHtml = submissions.map(item => {
        const namaTraining =
          item.jenis_pelatihan_unit ||
          item.jenis_pelatihan_teknikal ||
          item.kategori_pelatihan ||
          "-";

        const tanggal = item.final_submitted_at || item.created_at;

        return `
          <tr>
            <td>${peserta.nrp ?? "-"}</td>
            <td>${peserta.nama_lengkap ?? "-"}</td>
            <td>${namaTraining}</td>
            <td>${tanggal ? new Date(tanggal).toLocaleString("id-ID") : "-"}</td>
            <td><span class="badge">Submitted</span></td>
            <td><a href="admin-detail.html?id=${item.id}" class="action-link">Lihat Detail</a></td>
          </tr>
        `;
      }).join("");

      searchResult.innerHTML = `
        <div class="table-card" style="margin-bottom:0;">
          <div class="section-title">Hasil Pencarian</div>
          <table>
            <thead>
              <tr>
                <th>NRP</th>
                <th>Nama</th>
                <th>Training</th>
                <th>Tanggal</th>
                <th>Status</th>
                <th>Aksi</th>
              </tr>
            </thead>
            <tbody>
              ${rowsHtml}
            </tbody>
          </table>
        </div>
      `;
    } catch (err) {
      console.error(err);
      searchMessage.textContent = "Terjadi kesalahan saat mengambil data.";
      searchMessage.style.color = "red";
    }
  });
</script>
</body>
</html>
